apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: Surgical Analytics CI
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  secrets-scan:
    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v1
      - name: Secrets Detection
        uses: cloudbees-io/trufflehog-secret-scan-code@v1
        with:
          branch: main

  sast-scan:
    needs:
      - secrets-scan
    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v1
      - name: SAST Scan
        uses: cloudbees-io/sonarqube-bundled-sast-scan-code@v2
        with:
          language: python

  sca-scan:
    needs:
      - secrets-scan
    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v1
      - name: SCA — Dependency Vulnerability Scan
        uses: cloudbees-io/snyk-sca-scan-dependency@v1
        with:
          snyk-token: ${{ secrets.SNYK_TOKEN }}
          language: python

  build:
    needs:
      - sast-scan
      - sca-scan
    outputs:
      artifact-id: ${{ steps.register-artifact.outputs.artifact-id }}
    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v1
      - name: Build analytics platform
        uses: docker://python:3.11-slim
        run: |
          pip install -r requirements.txt --quiet 2>/dev/null || echo "No requirements.txt"
          echo "Build complete — surgical-analytics v3.2.${{ cloudbees.run_number }}"
      - name: Register build artifact
        id: register-artifact
        uses: cloudbees-io/register-build-artifact@v2
        with:
          name: surgical-analytics
          version: 3.2.${{ cloudbees.run_number }}
          url: https://github.com/shozab-unify-examples/stryker-surgical-analytics
      - name: Publish build evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |
            ## Surgical Analytics Build
            - **Version**: 3.2.${{ cloudbees.run_number }}
            - **Platform**: OSEP | Business Unit: OSEP Engineering
            - **Classification**: HIGH | analytics | clinical | regulated | osep
            - **Traceability**: OPEN FINDING — incomplete audit evidence for recent regulated changes
          format: MARKDOWN

  deploy-dev:
    needs:
      - build
    steps:
      - name: Deploy to Dev
        uses: docker://alpine:3.19
        run: echo "Deploying surgical-analytics v3.2.${{ cloudbees.run_number }} to DEV"
      - name: Register deployed artifact
        uses: cloudbees-io/register-deployed-artifact@v2
        with:
          artifact-id: ${{ needs.build.outputs.artifact-id }}
          name: surgical-analytics
          version: 3.2.${{ cloudbees.run_number }}
          environment-name: surgical-analytics-dev
          url: https://github.com/shozab-unify-examples/stryker-surgical-analytics

  deploy-staging:
    needs:
      - build
      - deploy-dev
    steps:
      - name: Deploy to Staging
        uses: docker://alpine:3.19
        run: echo "Deploying surgical-analytics v3.2.${{ cloudbees.run_number }} to STAGING"
      - name: Register deployed artifact
        uses: cloudbees-io/register-deployed-artifact@v2
        with:
          artifact-id: ${{ needs.build.outputs.artifact-id }}
          name: surgical-analytics
          version: 3.2.${{ cloudbees.run_number }}
          environment-name: surgical-analytics-staging
          url: https://github.com/shozab-unify-examples/stryker-surgical-analytics

  deploy-prod:
    needs:
      - build
      - deploy-staging
    steps:
      - name: Deploy to Production
        uses: docker://alpine:3.19
        run: echo "Deploying surgical-analytics v3.2.${{ cloudbees.run_number }} to PRODUCTION"
      - name: Register deployed artifact
        uses: cloudbees-io/register-deployed-artifact@v2
        with:
          artifact-id: ${{ needs.build.outputs.artifact-id }}
          name: surgical-analytics
          version: 3.2.${{ cloudbees.run_number }}
          environment-name: surgical-analytics-prod
          url: https://github.com/shozab-unify-examples/stryker-surgical-analytics
