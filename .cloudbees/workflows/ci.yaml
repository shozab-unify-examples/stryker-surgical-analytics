apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: Surgical Analytics CI
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  scan:
    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v1
      - name: Mock Secrets Scan
        uses: docker://alpine:3.19
        run: |
          echo "SCAN secrets complete - 0 findings"
      - name: Mock SAST Scan
        uses: docker://alpine:3.19
        run: |
          echo "SCAN sast complete - 1 finding MEDIUM"
      - name: Publish Security Evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |
            ## Security Scan Results — Surgical Analytics
            | Scanner | Findings | Severity |
            |---------|----------|----------|
            | Secrets | 0 | — |
            | SAST | 1 | MEDIUM |

            **Traceability Governance**: OPEN — missing audit evidence for regulated changes (CCI-AUDIT-001)
            **SLA Status**: IN SLA — no overdue findings
          format: MARKDOWN

  build:
    needs:
      - scan
    outputs:
      artifact-id: ${{ steps.register-artifact.outputs.artifact-id }}
    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v1
      - name: Build
        uses: docker://alpine:3.19
        run: |
          echo "Building surgical-analytics v3.2.${{ cloudbees.run_number }}"
      - name: Register build artifact
        id: register-artifact
        uses: cloudbees-io/register-build-artifact@v2
        with:
          name: surgical-analytics
          version: 3.2.${{ cloudbees.run_number }}
          url: https://github.com/shozab-unify-examples/stryker-surgical-analytics
      - name: Publish Build Evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |
            ## Build — Surgical Analytics v3.2.${{ cloudbees.run_number }}
            - **Platform**: OSEP | Business Unit: OSEP Engineering
            - **Classification**: HIGH | analytics | clinical | regulated
          format: MARKDOWN

  deploy-dev:
    needs:
      - build
    steps:
      - name: Deploy to Dev
        uses: docker://alpine:3.19
        run: |
          echo "Deployed surgical-analytics v3.2.${{ cloudbees.run_number }} to DEV"
      - name: Register Deployed Artifact
        uses: cloudbees-io/register-deployed-artifact@v2
        with:
          artifact-id: ${{ needs.build.outputs.artifact-id }}
          target-environment: stryker-dev

  deploy-staging:
    needs:
      - build
      - deploy-dev
    steps:
      - name: Deploy to Staging
        uses: docker://alpine:3.19
        run: |
          echo "Deployed surgical-analytics v3.2.${{ cloudbees.run_number }} to STAGING"
      - name: Register Deployed Artifact
        uses: cloudbees-io/register-deployed-artifact@v2
        with:
          artifact-id: ${{ needs.build.outputs.artifact-id }}
          target-environment: stryker-staging

  deploy-prod:
    needs:
      - build
      - deploy-staging
    steps:
      - name: Deploy to Production
        uses: docker://alpine:3.19
        run: |
          echo "Deployed surgical-analytics v3.2.${{ cloudbees.run_number }} to PRODUCTION"
      - name: Register Deployed Artifact
        uses: cloudbees-io/register-deployed-artifact@v2
        with:
          artifact-id: ${{ needs.build.outputs.artifact-id }}
          target-environment: stryker-prod
